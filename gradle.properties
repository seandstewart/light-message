# Gradle configuration for macOS ARM64 (Apple Silicon M1/M2/M3)
# Note: Gradle 8.5 has known issues with native-platform on ARM64
# Workaround: Use alternative file system services

org.gradle.jvmargs=-Xmx2048m -XX:+UnlockExperimentalVMOptions -XX:+UseZGC
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.file.watch.enabled=false

# Android X and Kotlin settings
android.useAndroidX=true
kotlin.code.style=official
kotlin.incremental=true
