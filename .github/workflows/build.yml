name: Build

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**.kt'
      - '**.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - '**.kt'
      - '**.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Android APK (JDK 17)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Build Android APK (Gradle only, skip Rust native lib)
        run: gradle assembleDebug
        env:
          CI: true

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug
          path: 'tool/build/outputs/apk/debug/**/*.apk'
          if-no-files-found: warn

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-reports
          path: 'tool/build/reports/'
          if-no-files-found: warn
