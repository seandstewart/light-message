name: Lint

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**.kt'
      - '**.gradle.kts'
      - 'detekt.yml'
      - '.github/workflows/lint.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - '**.kt'
      - '**.gradle.kts'
      - 'detekt.yml'
      - '.github/workflows/lint.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Kotlin Lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Run Kotlin linting
        run: gradle :tool:lintKotlin
